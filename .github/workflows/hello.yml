name: Hello World Workflow

on:
  push:
    branches: [ master ]

jobs:
  run-python:
    runs-on: ubuntu-latest
    
    steps:
      # Get your code
      - name: Checkout code
        uses: actions/checkout@v3
      
      # Setup Python
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      # Run your script
      - name: Run Python script
        run: python hello.py